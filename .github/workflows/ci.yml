name: Frontend CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci || npm install
      
    - name: Build Next.js App
      run: npm run build
      
    # - name: Run Tests
    #   run: npm test # Uncomment this when Jest or Vitest is configured
